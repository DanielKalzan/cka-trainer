# Dies on startup unless DB_HOST is set — a real CrashLoopBackOff whose cause
# is only visible in the container logs, exactly like the sim scenario.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "starting acme-api 2.4"
              if [ -z "$DB_HOST" ]; then
                echo "FATAL: required environment variable DB_HOST is not set"
                exit 1
              fi
              echo "connected to $DB_HOST"
              sleep 86400
