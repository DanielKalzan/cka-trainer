apiVersion: v1
kind: Pod
metadata:
  name: db-0
  labels:
    app: db
spec:
  containers:
    - name: db
      image: postgres:17-alpine
      env:
        - name: POSTGRES_PASSWORD
          value: trainer
      ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Pod
metadata:
  name: web-1
  labels:
    app: web
spec:
  containers:
    - name: web
      image: nginx:1.27-alpine
      ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Pod
metadata:
  name: web-2
  labels:
    app: web
spec:
  containers:
    - name: web
      image: nginx:1.27-alpine
      ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Pod
metadata:
  name: batch-runner
  labels:
    app: batch
spec:
  containers:
    - name: batch
      image: busybox:1.36
      command: ["sh", "-c", "sleep 86400"]
