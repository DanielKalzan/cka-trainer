# nodeAffinity requires disktype=ssd, but no node in this cluster carries that
# label yet — every replica is born Pending with a FailedScheduling event
# naming the exact key/value it's looking for.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: indexer
  labels:
    app: indexer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: indexer
  template:
    metadata:
      labels:
        app: indexer
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: disktype
                    operator: In
                    values:
                      - ssd
      containers:
        - name: indexer
          image: busybox:1.36
          command: ["sh", "-c", "sleep 86400"]
