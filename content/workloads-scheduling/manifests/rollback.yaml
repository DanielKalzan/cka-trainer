# Revision 1: the healthy release. The session setup then `kubectl set image`s
# it to a nonexistent tag, creating the stuck revision 2 the user must undo.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
  labels:
    app: payments
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payments
  template:
    metadata:
      labels:
        app: payments
    spec:
      containers:
        - name: payments
          image: nginx:1.26-alpine
