name: CI

on:
  push:
    branches-ignore:
      - "ci/**"
      - "docs/**"
  pull_request:

# CI only reads the repo (checkout) — don't inherit the default, broader token.
permissions:
  contents: read

jobs:
  ci:
    # pull_request branch filters only match the base branch, so skip PRs from
    # ci/* and docs/* head branches here instead.
    if: github.event_name != 'pull_request' || (!startsWith(github.head_ref, 'ci/') && !startsWith(github.head_ref, 'docs/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
