name: CI

on:
  push:
    branches-ignore:
      - "ci/**"
      - "docs/**"
  pull_request:

# CI only reads the repo (checkout) — don't inherit the default, broader token.
permissions:
  contents: read

jobs:
  ci:
    # pull_request branch filters only match the base branch, so skip PRs from
    # ci/* and docs/* head branches here instead.
    if: github.event_name != 'pull_request' || (!startsWith(github.head_ref, 'ci/') && !startsWith(github.head_ref, 'docs/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
