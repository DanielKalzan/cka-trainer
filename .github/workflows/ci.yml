name: CI

on:
  push:
    branches-ignore:
      - "ci/**"
      - "docs/**"
  pull_request:

jobs:
  ci:
    # pull_request branch filters only match the base branch, so skip PRs from
    # ci/* and docs/* head branches here instead.
    if: github.event_name != 'pull_request' || (!startsWith(github.head_ref, 'ci/') && !startsWith(github.head_ref, 'docs/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
