name: Release

on:
  push:
    tags:
      - "v*.*.*"

# Default for all jobs: read-only. Only the image-push job below widens this to
# packages: write — validate and integration-test never need it.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  integration-test:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: cka-trainer
          config: kind-config.yaml

      - name: Export kubeconfig
        run: kind get kubeconfig --name cka-trainer > .kubeconfig

      - name: Warm exercise images (best-effort)
        run: bash scripts/cluster/warm-images.sh "$(command -v kind)" cka-trainer

      - name: Start terminal bridge
        run: |
          KUBECONFIG="$PWD/.kubeconfig" npx tsx server/index.ts > bridge.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:3001 > /dev/null && exit 0
            sleep 1
          done
          echo "bridge did not come up in time" >&2
          cat bridge.log >&2
          exit 1

      - name: Smoke test (real shell + real checker against the real cluster)
        run: node scripts/ci/smoke-test.mjs
        env:
          KUBECONFIG: ${{ github.workspace }}/.kubeconfig

      - name: Bridge log
        if: always()
        run: cat bridge.log || true

  release:
    needs: [validate, integration-test]
    runs-on: ubuntu-latest
    # The only job that pushes images — scope the write here, not workflow-wide.
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # Third-party actions pinned to a commit SHA (version in comment) so a
      # retargeted tag can't inject code into a job that holds packages: write.
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/app.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/app:${{ env.VERSION }}
            ghcr.io/${{ github.repository }}/app:latest
