# Full dev stack: kind cluster + Next.js frontend + terminal bridge.
#
#   docker compose up --build          start everything (creates the cluster on first run)
#   docker compose --profile teardown run --rm cluster-down   delete the kind cluster
#
# Both services use the host network namespace (Linux) — this is required, not
# cosmetic: the kind kubeconfig's API address is 127.0.0.1:<port> (kind
# publishes it on the host loopback), so app's kubectl / @kubernetes/client-node
# and cluster-init's kind CLI can only reach it by sharing the host netns.
#  - app's bridge binds 127.0.0.1:3001 (see server/index.ts). With host
#    networking that IS the host loopback, so the browser on this machine can
#    reach it while the LAN/internet cannot — the bridge has no auth layer, so
#    it must never be exposed beyond localhost.
#    NOTE: network_mode: host removes Docker's network isolation for the WHOLE
#    container, not just port 3001 — EVERY port anything in this container
#    listens on is published on the host. Any new listener added here must bind
#    127.0.0.1, or it silently becomes LAN/internet-reachable with no gate.
#  - the docker socket is mounted on app because the node-level scenarios (etcd
#    backup/restore) `docker exec` into the kind node containers. This grants
#    host-Docker (≈ host root) access to the app container, which is acceptable
#    ONLY because the bridge is localhost-bound and single-user. Do not expose
#    this service to the network while the socket is mounted.
# `docker compose down` leaves the kind cluster running — use the teardown
# profile (or npm run cluster:down) to delete it.

services:
  cluster-init:
    build:
      context: docker
      dockerfile: cluster.Dockerfile
      network: host
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/work
    restart: "no"

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      network: host
    network_mode: host
    depends_on:
      cluster-init:
        condition: service_completed_successfully
    volumes:
      - .:/app
      # Named volumes shadow the bind mount: node_modules keeps the
      # container-built node-pty; .next keeps dev builds off the host tree.
      - node_modules:/app/node_modules
      - next_cache:/app/.next
      # Node-level scenarios (etcd backup) docker-exec into the kind nodes.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      KUBECONFIG: /app/.kubeconfig

  cluster-down:
    profiles: ["teardown"]
    build:
      context: docker
      dockerfile: cluster.Dockerfile
      network: host
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["kind", "delete", "cluster", "--name", "cka-trainer"]

volumes:
  node_modules:
  next_cache:
